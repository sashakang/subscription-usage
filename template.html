<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: #111118;
    color: #e0e0e0;
    padding: 20px;
    min-height: 100vh;
  }
  h1 { text-align: center; font-size: 1.6em; margin-bottom: 8px; color: #fff; }
  .subtitle { text-align: center; color: #666; font-size: 0.85em; margin-bottom: 24px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 24px; max-width: 1000px; margin-left: auto; margin-right: auto; align-items: center;
  }
  .card {
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px;
    padding: 20px; text-align: center;
  }
  .card .label { color: #888; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
  .card .value { font-size: 2.4em; font-weight: 700; margin: 8px 0 4px; }
  .card .detail { color: #666; font-size: 0.8em; }
  .green { color: #4ade80; } .yellow { color: #fbbf24; } .red { color: #f87171; }
  .bar-wrap { width:100%; height:8px; background:#2a2a3a; border-radius:4px; margin-top:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition: width 0.5s ease; }
  .chart-box {
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px;
    padding: 20px; margin-bottom: 16px; max-width: 1000px; margin-left: auto; margin-right: auto;
  }
  .chart-title { font-size: 1em; font-weight: 600; margin-bottom: 12px; color: #ccc; }
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap-sm { position: relative; height: 180px; }
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; max-width: 1000px; margin: 0 auto 16px;
  }
  .stat-box {
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px;
    padding: 12px 16px; font-size: 0.85em;
  }
  .stat-box .sl { color: #888; font-size: 0.75em; text-transform: uppercase; }
  .stat-box .sv { font-size: 1.3em; font-weight: 600; margin-top: 2px; }
  .alert {
    background: #2d1b1b; border: 1px solid #7f1d1d; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px; max-width: 1000px;
    margin-left: auto; margin-right: auto; color: #fca5a5; display: none;
  }
  .alert.show { display: block; }
  .footer { text-align: center; color: #555; font-size: 0.75em; margin-top: 24px; }
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 24px; border-radius: 8px; border: 1px solid #2a2a3a;
    background: #1a1a24; color: #888; cursor: pointer; font-size: 0.95em; font-weight: 600;
    transition: all 0.2s;
  }
  .tab-btn:hover { border-color: #444; color: #ccc; }
  .tab-btn.active { background: #2a2a3a; color: #fff; border-color: #555; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
<meta http-equiv="refresh" content="600">
</head>
<body>

<h1>⚡ Usage Dashboard</h1>
<div class="subtitle" id="subtitle"></div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>
<div class="footer" id="footer"></div>

<script>
const rawData = __DATA_PLACEHOLDER__;

// ── Helpers ──
function col(p) { return p < 50 ? '#4ade80' : p < 80 ? '#fbbf24' : '#f87171'; }
function cls(p) { return p < 50 ? 'green' : p < 80 ? 'yellow' : 'red'; }
function ttl(iso) {
  if (!iso) return '—';
  const d = new Date(iso) - new Date(); if (d < 0) return 'expired';
  const h = d/3600000; return h > 24 ? (h/24).toFixed(1)+'d' : Math.floor(h)+'h '+Math.floor((d%3600000)/60000)+'m';
}
function esc(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

// ── Chart config ──
const timeScale = {type:'time',time:{tooltipFormat:'MMM d, HH:mm'},grid:{color:'#1e1e2e'},ticks:{color:'#666'}};
const pctScale = {min:0,max:100,grid:{color:'#1e1e2e'},ticks:{color:'#666',callback:v=>v+'%'}};
const burnYScale = {grid:{color:'#1e1e2e'},ticks:{color:'#666',callback:v=>v.toFixed(1)+'%/h'}};
const burn10mYScale = {grid:{color:'#1e1e2e'},ticks:{color:'#666',callback:v=>v.toFixed(1)+'%/10m'}};

function xScale5h(start, end) {
  return {x:{...timeScale,min:start,max:end,time:{...timeScale.time,unit:'hour',stepSize:1,displayFormats:{hour:'HH:mm'}},grid:{color:'#2a2a3a',lineWidth:1}}};
}
function xScale7d(start, end) {
  return {
    x:{...timeScale,min:start,max:end,time:{...timeScale.time,unit:'hour',stepSize:3,displayFormats:{hour:'HH:mm'}},grid:{color:'#1e1e2e',lineWidth:1},ticks:{color:'#555',font:{size:9}}},
    x2:{type:'time',position:'bottom',min:start,max:end,time:{unit:'day',displayFormats:{day:'EEE d'},tooltipFormat:'MMM d'},grid:{color:'#2a2a3a',lineWidth:2,drawTicks:true},ticks:{color:'#888',font:{size:11,weight:'bold'}}}
  };
}

function makeUsageChart(canvas, data, resetTs, windowH, field, color, bgColor) {
  if (!resetTs) return;
  const end = new Date(resetTs), start = new Date(end - windowH*3600000);
  const filtered = data.filter(d => { const t = new Date(d.ts); return t >= start && t <= end; });
  const xScales = windowH <= 5 ? xScale5h(start, end) : xScale7d(start, end);
  new Chart(canvas, {
    type:'line', data: {
      labels: [start, ...filtered.map(d=>new Date(d.ts)), end],
      datasets: [
        {label:field,data:[null, ...filtered.map(d=>d[field]??0), null],borderColor:color,backgroundColor:bgColor,fill:true,tension:0.3,pointRadius:2},
        {label:'Linear pace',data:[0, ...filtered.map(()=>null), 100],borderColor:'#ffffff55',borderDash:[6,4],borderWidth:1,pointRadius:0,fill:false,tension:0,spanGaps:true}
      ]
    }, options: {responsive:true,maintainAspectRatio:false,scales:{...xScales,y:{...pctScale}},plugins:{legend:{display:false}}}
  });
}

function makeBurnChart(canvas, data, resetTs, windowH, rateData, field, color, bgColor, doHourly, rawField) {
  if (!resetTs) return;
  const end = new Date(resetTs), start = new Date(end - windowH*3600000);
  let labels, values;
  if (doHourly) {
    const inWindow = data.filter(d => { const t = new Date(d.ts); return t >= start && t <= end && d[rawField] != null; });
    const hourBins = {};
    inWindow.forEach(d => { const t = new Date(d.ts); t.setMinutes(0,0,0); const k = t.getTime(); hourBins[k] = d[rawField]; });
    const hours = Object.keys(hourBins).map(Number).sort((a,b)=>a-b);
    labels = []; values = [];
    for (let h = 1; h < hours.length; h++) {
      const delta = hourBins[hours[h]] - hourBins[hours[h-1]];
      labels.push(new Date(hours[h]));
      values.push(delta > 0 ? delta : 0);
    }
  } else {
    const filtered = rateData.filter(r => { const t = new Date(r.ts); return t >= start && t <= end; });
    labels = filtered.map(r=>new Date(r.ts)); values = filtered.map(r=>r[field]);
  }
  const xScales = windowH <= 5 ? xScale5h(start, end) : xScale7d(start, end);
  const evenRate = doHourly ? 100 / windowH : 100 / (windowH * 6);
  const allLabels = [start, ...labels, end];
  const allValues = [null, ...values, null];
  new Chart(canvas, {
    type:'line', data: { labels: allLabels,
      datasets:[
        {label:field,data:allValues,borderColor:color,backgroundColor:bgColor,fill:true,tension:0,pointRadius:3,pointBackgroundColor:color},
        {label:'Even pace',data:allLabels.map(()=>evenRate),borderColor:'#ffffff55',borderDash:[6,4],borderWidth:1,pointRadius:0,fill:false}
      ]
    }, options: {responsive:true,maintainAspectRatio:false,scales:{...xScales,y:doHourly?burnYScale:burn10mYScale},plugins:{legend:{display:false}}}
  });
}

// ── Group data by service:account ──
// First pass: collect all records, tracking known accounts per service
const groups = {};
const svcAccounts = {}; // service → Set of non-default accounts
rawData.forEach(d => {
  if (d.seven_day == null && d.five_hour == null) return;
  const svc = d.service || 'claude';
  const acct = d.account || 'default';
  if (acct !== 'default') {
    if (!svcAccounts[svc]) svcAccounts[svc] = new Set();
    svcAccounts[svc].add(acct);
  }
  const key = svc + ':' + acct;
  if (!groups[key]) groups[key] = {service: svc, account: acct, data: []};
  groups[key].data.push(d);
});
// Merge "default" into the real account only when exactly one exists for that service
Object.keys(groups).forEach(key => {
  const g = groups[key];
  if (g.account !== 'default') return;
  const known = svcAccounts[g.service];
  if (known && known.size === 1) {
    const realAcct = [...known][0];
    const targetKey = g.service + ':' + realAcct;
    if (!groups[targetKey]) groups[targetKey] = {service: g.service, account: realAcct, data: []};
    groups[targetKey].data.push(...g.data);
    groups[targetKey].data.sort((a,b) => a.ts.localeCompare(b.ts));
    delete groups[key];
  }
});

const keys = Object.keys(groups).sort((a,b) => {
  const ga = groups[a], gb = groups[b];
  if (ga.service !== gb.service) return ga.service.localeCompare(gb.service); // claude before codex
  const la = ga.data[ga.data.length-1].ts, lb = gb.data[gb.data.length-1].ts;
  return lb.localeCompare(la); // most recent first within same service
});
if (!keys.length) { document.getElementById('footer').textContent = 'No data yet'; }

// Color palettes per service
const palette = {
  claude: {session: ['#60a5fa','rgba(96,165,250,0.1)'], weekly: ['#f97316','rgba(249,115,22,0.1)'], sonnet: ['#a78bfa','rgba(167,139,250,0.1)']},
  codex:  {session: ['#10b981','rgba(16,185,129,0.1)'], weekly: ['#f59e0b','rgba(245,158,11,0.1)']},
};
function getPalette(svc) { return palette[svc] || palette.claude; }

// ── Tab label: "Service (user)" — deduplicate if only one account per service ──
function tabLabel(g) {
  const name = g.service.charAt(0).toUpperCase() + g.service.slice(1);
  return g.account === 'default' ? name : name + ' (' + g.account + ')';
}

// ── Build tabs and content ──
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

function switchTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-'+esc(key)));
}

keys.forEach((key, idx) => {
  const g = groups[key];
  const data = g.data;
  const L = data[data.length-1];
  const p = getPalette(g.service);
  const id = esc(key);
  const hasSonnet = g.service === 'claude' && data.some(d => d.sonnet != null);

  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = tabLabel(g);
  btn.dataset.key = key;
  btn.onclick = () => switchTab(key);
  tabsEl.appendChild(btn);

  // Tab content
  const tab = document.createElement('div');
  tab.id = 'tab-' + id;
  tab.className = 'tab-content' + (idx === 0 ? ' active' : '');

  // Build cards HTML
  let cardsHtml = `
    <div class="alert" id="alert-${id}">⚠️ <span id="alert-text-${id}"></span></div>
    <div class="cards">
      <div class="card">
        <div class="label">Session (5h)</div>
        <div class="value ${cls(L.five_hour??0)}">${(100-(L.five_hour??0)).toFixed(0)}%</div>
        <div class="detail">${L.five_hour??0}% used · resets ${ttl(L.five_hour_resets)}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${L.five_hour??0}%;background:${col(L.five_hour??0)}"></div></div>
      </div>
      <div class="card">
        <div class="label">Weekly (7d)</div>
        <div class="value ${cls(L.seven_day??0)}">${(100-(L.seven_day??0)).toFixed(0)}%</div>
        <div class="detail">${L.seven_day??0}% used · resets ${ttl(L.seven_day_resets)}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${L.seven_day??0}%;background:${col(L.seven_day??0)}"></div></div>
      </div>`;
  if (hasSonnet) {
    cardsHtml += `
      <div class="card">
        <div class="label">Sonnet (Weekly)</div>
        <div class="value ${cls(L.sonnet??0)}">${(100-(L.sonnet??0)).toFixed(0)}%</div>
        <div class="detail">${L.sonnet??0}% used · resets ${ttl(L.seven_day_resets)}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${L.sonnet??0}%;background:${col(L.sonnet??0)}"></div></div>
      </div>`;
  }
  const hasExtra = L.extra_enabled && L.extra_limit != null;
  if (hasExtra) {
    const ep = L.extra_pct ?? 0;
    const used = (L.extra_used ?? 0) / 100;
    const limit = (L.extra_limit ?? 0) / 100;
    // Monthly reset: 1st of next month
    const now = new Date(L.ts);
    const resetDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth()+1, 1));
    const resetStr = resetDate.toLocaleDateString('en-US', {month:'short', day:'numeric', timeZone:'UTC'});
    cardsHtml += `
      <div class="card">
        <div class="label">Extra Usage</div>
        <div class="value ${cls(ep)}" style="font-size:1.6em">\$${used.toFixed(2)} / \$${limit.toFixed(0)}</div>
        <div class="detail">${ep.toFixed(1)}% spent · Resets ${resetStr}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${ep}%;background:${col(ep)}"></div></div>
      </div>`;
  }
  cardsHtml += `</div>`;

  // Stats row
  cardsHtml += `
    <div class="stats-row">
      <div class="stat-box"><div class="sl">Burn Rate (weekly/hr)</div><div class="sv" id="burn-${id}">--</div></div>
      <div class="stat-box"><div class="sl">Est. Weekly Exhaustion</div><div class="sv" id="exhaust-${id}">--</div></div>
      <div class="stat-box"><div class="sl">Peak Session Usage</div><div class="sv" id="peak-${id}">--</div></div>
      <div class="stat-box"><div class="sl">Weekly Reset</div><div class="sv" id="reset-${id}">--</div></div>
    </div>`;

  // Charts
  cardsHtml += `
    <div class="chart-box"><div class="chart-title">⏱ Session (5h Window)</div><div class="chart-wrap"><canvas id="session-${id}"></canvas></div></div>
    <div class="chart-box"><div class="chart-title">🔥 Session Burn Rate (%/10m)</div><div class="chart-wrap-sm"><canvas id="burnSession-${id}"></canvas></div></div>
    <div class="chart-box"><div class="chart-title">📅 Weekly (7d Window)</div><div class="chart-wrap"><canvas id="weekly-${id}"></canvas></div></div>
    <div class="chart-box"><div class="chart-title">🔥 Weekly Burn Rate (%/h)</div><div class="chart-wrap-sm"><canvas id="burnWeekly-${id}"></canvas></div></div>`;
  if (hasSonnet) {
    cardsHtml += `
    <div class="chart-box"><div class="chart-title">💎 Sonnet (Weekly)</div><div class="chart-wrap"><canvas id="sonnet-${id}"></canvas></div></div>
    <div class="chart-box"><div class="chart-title">🔥 Sonnet Burn Rate (%/h)</div><div class="chart-wrap-sm"><canvas id="burnSonnet-${id}"></canvas></div></div>`;
  }
  if (hasExtra) {
    cardsHtml += `
    <div class="chart-box"><div class="chart-title">💰 Extra Usage (Monthly)</div><div class="chart-wrap"><canvas id="extra-${id}"></canvas></div></div>`;
  }

  tab.innerHTML = cardsHtml;
  contentEl.appendChild(tab);

  // ── Alerts ──
  const alerts = [];
  if (L.seven_day_resets) {
    const resetMs = new Date(L.seven_day_resets).getTime();
    const sampleMs = new Date(L.ts).getTime();
    const windowMs = 168 * 3600000;
    const elapsed = windowMs - (resetMs - sampleMs);
    const linearPace = Math.max(0, Math.min(100, elapsed / windowMs * 100));
    if (L.seven_day > linearPace) alerts.push('Weekly at '+L.seven_day+'% — above pace ('+linearPace.toFixed(0)+'%)');
  }
  if (L.seven_day >= 90) alerts.push('Weekly usage at '+L.seven_day+'%');
  if (L.five_hour >= 90) alerts.push('Session usage at '+L.five_hour+'%');
  if (alerts.length) {
    document.getElementById('alert-text-'+id).textContent = alerts.join(' · ');
    document.getElementById('alert-'+id).className = 'alert show';
  }

  // ── Stats ──
  const rec = data.filter(d=>d.seven_day!=null).slice(-12);
  if (rec.length >= 2) {
    const hrs = (new Date(rec[rec.length-1].ts)-new Date(rec[0].ts))/3600000;
    const delta = rec[rec.length-1].seven_day-rec[0].seven_day;
    const rate = hrs > 0 ? delta/hrs : 0;
    const burnEl = document.getElementById('burn-'+id);
    burnEl.textContent = rate.toFixed(2)+'%/h';
    burnEl.className = 'sv '+cls(rate*168>100?80:rate*24>5?50:0);
    const exhaustEl = document.getElementById('exhaust-'+id);
    if (rate > 0 && L.seven_day!=null) {
      const hLeft = (100-L.seven_day)/rate;
      exhaustEl.textContent = hLeft > 168 ? 'Never (within reset)' : new Date(Date.now()+hLeft*3600000).toLocaleDateString('en-GB',{weekday:'short',hour:'2-digit',minute:'2-digit'});
      exhaustEl.className = 'sv '+(hLeft<24?'red':hLeft<72?'yellow':'green');
    } else { exhaustEl.textContent = 'No burn'; exhaustEl.className = 'sv green'; }
  }
  const validFh = data.filter(d=>d.five_hour!=null).map(d=>d.five_hour);
  const peakFh = validFh.length ? Math.max(...validFh) : 0;
  const peakEl = document.getElementById('peak-'+id);
  peakEl.textContent = peakFh+'%';
  peakEl.className = 'sv '+cls(peakFh);
  document.getElementById('reset-'+id).textContent = ttl(L.seven_day_resets);

  // ── Usage charts ──
  makeUsageChart(document.getElementById('session-'+id), data, L.five_hour_resets, 5, 'five_hour', p.session[0], p.session[1]);
  makeUsageChart(document.getElementById('weekly-'+id), data, L.seven_day_resets, 168, 'seven_day', p.weekly[0], p.weekly[1]);
  if (hasSonnet) {
    makeUsageChart(document.getElementById('sonnet-'+id), data, L.seven_day_resets, 168, 'sonnet', p.sonnet[0], p.sonnet[1]);
  }

  // ── Burn rates ──
  const rates = [];
  for (let i=1;i<data.length;i++) {
    const dt=(new Date(data[i].ts)-new Date(data[i-1].ts))/3600000;
    if(dt<0.05 || dt>0.5)continue;
    const s0=data[i-1].five_hour, s1=data[i].five_hour;
    const sDelta = (s0!=null && s1!=null && s1>=s0) ? s1-s0 : 0;
    const w0=data[i-1].seven_day, w1=data[i].seven_day;
    const wDelta = (w0!=null && w1!=null) ? w1-w0 : 0;
    const r = {ts:data[i].ts, session: sDelta, weekly: wDelta > 0 ? wDelta/dt : 0};
    if (hasSonnet) {
      const n0=data[i-1].sonnet, n1=data[i].sonnet;
      const snDelta = (n0!=null && n1!=null) ? n1-n0 : 0;
      r.sonnet = snDelta > 0 ? snDelta/dt : 0;
    }
    rates.push(r);
  }

  makeBurnChart(document.getElementById('burnSession-'+id), data, L.five_hour_resets, 5, rates, 'session', p.session[0], p.session[1], false);
  makeBurnChart(document.getElementById('burnWeekly-'+id), data, L.seven_day_resets, 168, rates, 'weekly', p.weekly[0], p.weekly[1], true, 'seven_day');
  if (hasSonnet) {
    makeBurnChart(document.getElementById('burnSonnet-'+id), data, L.seven_day_resets, 168, rates, 'sonnet', p.sonnet[0], p.sonnet[1], true, 'sonnet');
  }

  // ── Extra usage chart ──
  if (hasExtra) {
    const extraData = data.filter(d => d.extra_used != null);
    if (extraData.length) {
      const limit = (L.extra_limit ?? 0) / 100;
      const labels = extraData.map(d => new Date(d.ts));
      const values = extraData.map(d => (d.extra_used ?? 0) / 100);
      const dollarScale = {grid:{color:'#1e1e2e'},ticks:{color:'#666',callback:v=>'$'+v.toFixed(0)},min:0,suggestedMax:limit};
      // Calendar month x-axis: 1st to last day
      const sampleDate = new Date(L.ts);
      const monthStart = new Date(Date.UTC(sampleDate.getUTCFullYear(), sampleDate.getUTCMonth(), 1));
      const monthEnd = new Date(Date.UTC(sampleDate.getUTCFullYear(), sampleDate.getUTCMonth()+1, 0, 23, 59, 59));
      const xMonthly = {x:{...timeScale,min:monthStart,max:monthEnd,time:{...timeScale.time,unit:'day',displayFormats:{day:'MMM d'}},grid:{color:'#2a2a3a',lineWidth:1}}};
      // Linear pace line: $0 on 1st → $limit on last day
      const filteredExtra = extraData.filter(d => { const t = new Date(d.ts); return t >= monthStart && t <= monthEnd; });
      const fLabels = filteredExtra.map(d => new Date(d.ts));
      const fValues = filteredExtra.map(d => (d.extra_used ?? 0) / 100);
      new Chart(document.getElementById('extra-'+id), {
        type:'line', data: {
          labels: [monthStart, ...fLabels, monthEnd],
          datasets: [
            {label:'Spent',data:[null, ...fValues, null],borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',fill:true,tension:0.3,pointRadius:1},
            {label:'Limit',data:[0, ...fLabels.map(()=>null), limit],borderColor:'#f8717155',borderDash:[6,4],borderWidth:1,pointRadius:0,fill:false,spanGaps:true}
          ]
        }, options: {responsive:true,maintainAspectRatio:false,scales:{...xMonthly,y:dollarScale},plugins:{legend:{display:false}}}
      });
    }
  }
});

if (keys.length) {
  const totalPts = Object.values(groups).reduce((s,g) => s+g.data.length, 0);
  const allData = Object.values(groups).flatMap(g => g.data);
  const lastTs = allData.reduce((max,d) => d.ts > max ? d.ts : max, '');
  const lastDate = new Date(lastTs);
  const subtitleEl = document.getElementById('subtitle');
  function updateAgo() {
    const diff = Math.floor((Date.now() - lastDate.getTime()) / 1000);
    const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
    let ago = '';
    if (d > 0) ago = d + 'd ' + h + 'h';
    else if (h > 0) ago = h + 'h ' + m + 'm';
    else ago = (m > 0 ? m + 'm ' : '') + s + 's';
    subtitleEl.textContent = 'Updated ' + ago + ' ago';
  }
  updateAgo();
  setInterval(updateAgo, 1000);
  document.getElementById('footer').textContent = totalPts+' points · __VERSION_PLACEHOLDER__';
}
// Auto-reload: meta refresh handles background tabs; visibilitychange catches tab-switch
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && Date.now() - pageLoadTime > 10 * 60 * 1000) location.reload();
});
const pageLoadTime = Date.now();
</script>
